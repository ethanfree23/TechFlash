default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  adapter: sqlite3
  database: db/development.sqlite3

test:
  <<: *default
  adapter: sqlite3
  database: db/test.sqlite3
  # SQLite busy_handler wait (ms) — reduces flaky "database is locked" on WSL / shared test.sqlite3
  timeout: 10_000

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>

demo:
  <<: *default
  <% if ENV['DATABASE_URL'].present? %>
  url: <%= ENV['DATABASE_URL'] %>
  <% else %>
  adapter: sqlite3
  database: db/demo.sqlite3
  <% end %>
